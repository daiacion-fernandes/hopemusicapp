<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hope Music — Ministério de Louvor</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC5lRBAHKRJSYP_d4Iv780GSl2rx5Nk81M",
      authDomain: "hope-music-app-b0c8f.firebaseapp.com",
      projectId: "hope-music-app-b0c8f",
      storageBucket: "hope-music-app-b0c8f.firebasestorage.app",
      messagingSenderId: "873732380506",
      appId: "1:873732380506:web:ef67b0f6756d917e6f8563"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.__db = db;
    window.__firebase = { collection, onSnapshot, addDoc, deleteDoc, doc, setDoc };
    window.__firebaseReady = true;
    window.dispatchEvent(new Event("firebaseReady"));
  </script>
  <style>* { box-sizing: border-box; margin: 0; padding: 0; } body { font-family: 'Segoe UI', sans-serif; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const SENHA = "221938";

const NAV = [
  { id: "integrantes", label: "Integrantes", icon: "👥" },
  { id: "repertorio", label: "Repertório Geral", icon: "🎼" },
  { id: "playlist", label: "Playlist p/ Tirar", icon: "🎵" },
  { id: "escala", label: "Escala da Equipe", icon: "📅" },
  { id: "ensaios", label: "Ensaios", icon: "🎸" },
  { id: "setlist", label: "Setlist Culto", icon: "📋" },
  { id: "vocal", label: "Área Vocal", icon: "🎤" },
  { id: "comunicados", label: "Comunicados", icon: "📣" },
  { id: "devocionais", label: "Devocionais", icon: "📖" },
  { id: "aniversariantes", label: "Aniversariantes", icon: "🎂" },
];

const C = { navy:"#1e3a5f", offwhite:"#f7f5f0", card:"#ffffff", border:"#e2ddd5", text:"#1a2a3a", muted:"#7a8898", accent:"#2d5a9e", green:"#3d7a58", red:"#c0392b", gold:"#b8860b", soft:"#eef2f8" };
const fmtDate = d => { if(!d) return ""; const [y,m,day]=d.split("-"); return `${day}/${m}/${y}`; };
const monthName = m => ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"][m-1];
const today = () => new Date().toISOString().slice(0,10);

// Firebase helpers
const useCollection = (colName) => {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    if (!window.__firebaseReady) {
      const handler = () => startListen();
      window.addEventListener("firebaseReady", handler);
      return () => window.removeEventListener("firebaseReady", handler);
    }
    startListen();
    function startListen() {
      const { collection, onSnapshot } = window.__firebase;
      const db = window.__db;
      const unsub = onSnapshot(collection(db, colName), snap => {
        setItems(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        setLoading(false);
      });
      return unsub;
    }
  }, [colName]);
  return [items, loading];
};

const addItem = async (colName, data) => {
  const { collection, addDoc } = window.__firebase;
  await addDoc(collection(window.__db, colName), data);
};

const delItem = async (colName, id) => {
  const { doc, deleteDoc } = window.__firebase;
  await deleteDoc(doc(window.__db, colName, id));
};

const updateItem = async (colName, id, data) => {
  const { doc, setDoc } = window.__firebase;
  await setDoc(doc(window.__db, colName, id), data, { merge: true });
};

// UI Components
const Badge = ({label,color}) => <span style={{background:color+"22",color,border:`1px solid ${color}44`,borderRadius:50,padding:"2px 10px",fontSize:11,fontWeight:700}}>{label}</span>;
const Btn = ({children,onClick,variant="primary",small}) => {
  const s={primary:{background:C.navy,color:"#fff"},danger:{background:C.red,color:"#fff"},ghost:{background:"transparent",color:C.navy,border:`1px solid ${C.navy}`}};
  return <button onClick={onClick} style={{...s[variant],border:s[variant].border||"none",borderRadius:8,padding:small?"5px 12px":"8px 16px",fontSize:small?12:13,fontWeight:600,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:5}}>{children}</button>;
};
const Input = ({label,value,onChange,type="text",placeholder}) => (
  <div style={{display:"flex",flexDirection:"column",gap:4}}>
    {label&&<label style={{fontSize:12,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:1}}>{label}</label>}
    <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 12px",fontSize:14,color:C.text,outline:"none",background:"#fff"}}/>
  </div>
);
const Textarea = ({label,value,onChange,rows=3}) => (
  <div style={{display:"flex",flexDirection:"column",gap:4}}>
    {label&&<label style={{fontSize:12,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:1}}>{label}</label>}
    <textarea value={value} onChange={e=>onChange(e.target.value)} rows={rows} style={{border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 12px",fontSize:14,color:C.text,outline:"none",resize:"vertical",fontFamily:"inherit",background:"#fff"}}/>
  </div>
);
const Select = ({label,value,onChange,options}) => (
  <div style={{display:"flex",flexDirection:"column",gap:4}}>
    {label&&<label style={{fontSize:12,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:1}}>{label}</label>}
    <select value={value} onChange={e=>onChange(e.target.value)} style={{border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 12px",fontSize:14,color:C.text,outline:"none",background:"#fff"}}>
      {options.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
    </select>
  </div>
);
const Card = ({children,style}) => <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"20px",...style}}>{children}</div>;
const Modal = ({title,children,onClose}) => (
  <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:16}}>
    <div style={{background:"#fff",borderRadius:16,padding:28,maxWidth:520,width:"100%",maxHeight:"90vh",overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h3 style={{color:C.navy,fontSize:17,fontWeight:800,margin:0}}>{title}</h3>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:C.muted}}>✕</button>
      </div>
      {children}
    </div>
  </div>
);
const SH = ({title,icon,action,sub}) => (
  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
    <div>
      <h2 style={{color:C.navy,fontSize:20,fontWeight:800,margin:0}}>{icon} {title}</h2>
      {sub&&<p style={{color:C.muted,fontSize:13,marginTop:4}}>{sub}</p>}
    </div>
    {action}
  </div>
);
const Empty = ({msg}) => <p style={{color:C.muted,textAlign:"center",padding:"40px 0",fontSize:14}}>{msg}</p>;
const Loading = () => <p style={{color:C.muted,textAlign:"center",padding:"40px 0",fontSize:14}}>Carregando... 🔄</p>;

function LoginModal({onClose,onSuccess}) {
  const [val,setVal]=useState(""); const [erro,setErro]=useState(false);
  const tentar=()=>{if(val===SENHA){onSuccess();onClose();}else{setErro(true);setVal("");}};
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999,padding:16}}>
      <div style={{background:"#fff",borderRadius:20,padding:32,maxWidth:340,width:"100%",textAlign:"center"}}>
        <div style={{fontSize:40,marginBottom:12}}>🔒</div>
        <h3 style={{color:C.navy,fontSize:18,fontWeight:800,marginBottom:6}}>Área restrita</h3>
        <p style={{color:C.muted,fontSize:13,marginBottom:20}}>Digite a senha para editar o app</p>
        <input type="password" value={val} onChange={e=>{setVal(e.target.value);setErro(false);}} onKeyDown={e=>e.key==="Enter"&&tentar()} placeholder="Senha" style={{width:"100%",border:`2px solid ${erro?C.red:C.border}`,borderRadius:10,padding:"10px 14px",fontSize:16,color:C.text,outline:"none",textAlign:"center",marginBottom:8}}/>
        {erro&&<p style={{color:C.red,fontSize:12,marginBottom:8}}>Senha incorreta.</p>}
        <div style={{display:"flex",gap:8,marginTop:12}}>
          <Btn variant="ghost" onClick={onClose}>Cancelar</Btn>
          <Btn onClick={tentar}>Entrar</Btn>
        </div>
      </div>
    </div>
  );
}

function Integrantes({isAdmin,requireAdmin}) {
  const [items,loading]=useCollection("integrantes");
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({nome:"",funcao:""});
  const save=async()=>{if(!form.nome)return;await addItem("integrantes",form);setForm({nome:"",funcao:""});setModal(false);};
  const del=id=>requireAdmin(()=>delItem("integrantes",id));
  const colors=["#1e3a5f","#3d7a58","#9B59B6","#b8860b","#c0392b","#2d5a9e","#7B68EE","#8B4513"];
  return (
    <div>
      <SH title="Integrantes" icon="👥" action={<Btn onClick={()=>requireAdmin(()=>setModal(true))}>+ Adicionar</Btn>}/>
      {loading?<Loading/>:items.length===0?<Empty msg="Nenhum integrante cadastrado."/>:
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:14}}>
        {items.map((m,i)=>(
          <Card key={m.id} style={{textAlign:"center",position:"relative"}}>
            {isAdmin&&<button onClick={()=>del(m.id)} style={{position:"absolute",top:10,right:10,background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:14}}>✕</button>}
            <div style={{width:48,height:48,borderRadius:"50%",background:colors[i%colors.length]+"22",border:`2px solid ${colors[i%colors.length]}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,margin:"0 auto 10px"}}>🎵</div>
            <div style={{fontWeight:800,color:C.navy,fontSize:14,marginBottom:6}}>{m.nome}</div>
            <Badge label={m.funcao} color={colors[i%colors.length]}/>
          </Card>
        ))}
      </div>}
      {modal&&<Modal title="Novo Integrante" onClose={()=>setModal(false)}>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <Input label="Nome" value={form.nome} onChange={v=>setForm(f=>({...f,nome:v}))}/>
          <Input label="Função no ministério" value={form.funcao} onChange={v=>setForm(f=>({...f,funcao:v}))} placeholder="Ex: Vocal, Violão..."/>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn variant="ghost" onClick={()=>setModal(false)}>Cancelar</Btn><Btn onClick={save}>Salvar</Btn></div>
        </div>
      </Modal>}
    </div>
  );
}

function Repertorio({isAdmin,requireAdmin}) {
  const [items,loading]=useCollection("repertorio");
  const [modal,setModal]=useState(false);
  const [busca,setBusca]=useState("");
  const [form,setForm]=useState({nome:"",artista:"",tom:""});
  const save=async()=>{if(!form.nome)return;await addItem("repertorio",form);setForm({nome:"",artista:"",tom:""});setModal(false);};
  const del=id=>requireAdmin(()=>delItem("repertorio",id));
  const sorted=[...items].filter(m=>m.nome?.toLowerCase().includes(busca.toLowerCase())||m.artista?.toLowerCase().includes(busca.toLowerCase())).sort((a,b)=>a.nome?.localeCompare(b.nome,"pt-BR"));
  const tC=t=>({A:C.navy,B:"#6B21A8",C:C.green,D:"#b8860b",E:C.red,F:"#0891b2",G:"#7B68EE"}[t?.charAt(0)]||C.muted);
  return (
    <div>
      <SH title="Repertório Geral" icon="🎼" sub={`${items.length} música${items.length!==1?"s":""} · ordem alfabética`} action={<Btn onClick={()=>requireAdmin(()=>setModal(true))}>+ Adicionar</Btn>}/>
      <div style={{marginBottom:16}}><input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="🔍 Buscar música ou artista..." style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",fontSize:14,color:C.text,outline:"none",background:"#fff"}}/></div>
      {loading?<Loading/>:sorted.length===0?<Empty msg="Nenhuma música encontrada."/>:
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {sorted.map((m,i)=>(
          <Card key={m.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,padding:"14px 18px"}}>
            <div style={{display:"flex",alignItems:"center",gap:14,flex:1}}>
              <span style={{color:C.muted,fontSize:13,minWidth:24,fontWeight:600}}>{i+1}.</span>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,color:C.text,fontSize:15}}>{m.nome}</div>
                {m.artista&&<div style={{color:C.muted,fontSize:12}}>{m.artista}</div>}
              </div>
              {m.tom&&<div style={{background:tC(m.tom)+"18",border:`1.5px solid ${tC(m.tom)}44`,borderRadius:8,padding:"4px 12px",fontWeight:800,color:tC(m.tom),fontSize:14,minWidth:40,textAlign:"center"}}>{m.tom}</div>}
            </div>
            {isAdmin&&<Btn small variant="danger" onClick={()=>del(m.id)}>✕</Btn>}
          </Card>
        ))}
      </div>}
      {modal&&<Modal title="Nova Música no Repertório" onClose={()=>setModal(false)}>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <Input label="Nome da música" value={form.nome} onChange={v=>setForm(f=>({...f,nome:v}))}/>
          <Input label="Artista" value={form.artista} onChange={v=>setForm(f=>({...f,artista:v}))}/>
          <Input label="Tom" value={form.tom} onChange={v=>setForm(f=>({...f,tom:v}))} placeholder="Ex: A, G, D, Em..."/>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn variant="ghost" onClick={()=>setModal(false)}>Cancelar</Btn><Btn onClick={save}>Salvar</Btn></div>
        </div>
      </Modal>}
    </div>
  );
}

function Playlist({isAdmin,requireAdmin}) {
  const [items,loading]=useCollection("playlist");
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({nome:"",artista:"",tom:"",bpm:"",status:"ensaiando",link:""});
  const save=async()=>{if(!form.nome)return;await addItem("playlist",form);setForm({nome:"",artista:"",tom:"",bpm:"",status:"ensaiando",link:""});setModal(false);};
  const del=id=>requireAdmin(()=>delItem("playlist",id));
  const toggle=async(item)=>requireAdmin(()=>updateItem("playlist",item.id,{status:item.status==="concluída"?"ensaiando":"concluída"}));
  const sC=s=>s==="concluída"?C.green:C.gold;
  return (
    <div>
      <SH title="Playlist para Tirar" icon="🎵" action={<Btn onClick={()=>requireAdmin(()=>setModal(true))}>+ Adicionar</Btn>}/>
      {loading?<Loading/>:items.length===0?<Empty msg="Nenhuma música cadastrada."/>:
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {items.map(m=>(
          <Card key={m.id}>
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,color:C.text,fontSize:15}}>{m.nome}</div>
                <div style={{color:C.muted,fontSize:13}}>{m.artista}{m.tom&&` · Tom: ${m.tom}`}{m.bpm&&` · ${m.bpm} BPM`}</div>
                {m.link&&<a href={m.link} target="_blank" rel="noreferrer" style={{color:C.accent,fontSize:12}}>🔗 Ver vídeo</a>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                <Badge label={m.status==="concluída"?"✓ Concluída":"Ensaiando"} color={sC(m.status)}/>
                {isAdmin&&<><Btn small variant="ghost" onClick={()=>toggle(m)}>{m.status==="concluída"?"Reabrir":"Concluir"}</Btn><Btn small variant="danger" onClick={()=>del(m.id)}>✕</Btn></>}
              </div>
            </div>
          </Card>
        ))}
      </div>}
      {modal&&<Modal title="Nova Música" onClose={()=>setModal(false)}>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <Input label="Nome da música" value={form.nome} onChange={v=>setForm(f=>({...f,nome:v}))}/>
          <Input label="Artista" value={form.artista} onChange={v=>setForm(f=>({...f,artista:v}))}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Input label="Tom" value={form.tom} onChange={v=>setForm(f=>({...f,tom:v}))} placeholder="Ex: G"/>
            <Input label="BPM" value={form.bpm} onChange={v=>setForm(f=>({...f,bpm:v}))}/>
          </div>
          <Input label="Link" value={form.link} onChange={v=>setForm(f=>({...f,link:v}))}/>
          <Select label="Status" value={form.status} onChange={v=>setForm(f=>({...f,status:v}))} options={[{value:"ensaiando",label:"Ensaiando"},{value:"concluída",label:"Concluída"}]}/>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn variant="ghost" onClick={()=>setModal(false)}>Cancelar</Btn><Btn onClick={save}>Salvar</Btn></div>
        </div>
      </Modal>}
    </div>
  );
}

function Escala({isAdmin,requireAdmin}) {
  const [items,loading]=useCollection("escala");
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({data:today(),culto:"",membros:[{nome:"",funcao:""}]});
  const addM=()=>setForm(f=>({...f,membros:[...f.membros,{nome:"",funcao:""}]}));
  const updM=(i,k,v)=>setForm(f=>({...f,membros:f.membros.map((m,idx)=>idx===i?{...m,[k]:v}:m)}));
  const remM=i=>setForm(f=>({...f,membros:f.membros.filter((_,idx)=>idx!==i)}));
  const save=async()=>{if(!form.culto)return;await addItem("escala",form);setForm({data:today(),culto:"",membros:[{nome:"",funcao:""}]});setModal(false);};
  const del=id=>requireAdmin(()=>delItem("escala",id));
  return (
    <div>
      <SH title="Escala da Equipe" icon="📅" action={<Btn onClick={()=>requireAdmin(()=>setModal(true))}>+ Nova escala</Btn>}/>
      {loading?<Loading/>:items.length===0?<Empty msg="Nenhuma escala cadastrada."/>:
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {[...items].sort((a,b)=>a.data<b.data?-1:1).map(e=>(
          <Card key={e.id}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
              <div><div style={{fontSize:13,color:C.muted,fontWeight:600}}>{fmtDate(e.data)}</div><div style={{fontWeight:800,color:C.navy,fontSize:16}}>{e.culto}</div></div>
              {isAdmin&&<Btn small variant="danger" onClick={()=>del(e.id)}>✕</Btn>}
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {(e.membros||[]).map((m,i)=>(
                <div key={i} style={{background:C.soft,borderRadius:8,padding:"8px 14px"}}>
                  <div style={{fontWeight:700,fontSize:14,color:C.text}}>{m.nome}</div>
                  <div style={{fontSize:11,color:C.accent,fontWeight:600}}>{m.funcao}</div>
                </div>
              ))}
            </div>
          </Card>
        ))}
      </div>}
      {modal&&<Modal title="Nova Escala" onClose={()=>setModal(false)}>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Input label="Data" type="date" value={form.data} onChange={v=>setForm(f=>({...f,data:v}))}/>
            <Input label="Culto" value={form.culto} onChange={v=>setForm(f=>({...f,culto:v}))} placeholder="Ex: Dominical 19h"/>
          </div>
          <div>
            <label style={{fontSize:12,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:8}}>Membros</label>
            {form.membros.map((m,i)=>(
              <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 1fr auto",gap:8,marginBottom:8}}>
                <input value={m.nome} onChange={e=>updM(i,"nome",e.target.value)} placeholder="Nome" style={{border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 10px",fontSize:13,color:C.text,outline:"none"}}/>
                <input value={m.funcao} onChange={e=>updM(i,"funcao",e.target.value)} placeholder="Função" style={{border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 10px",fontSize:13,color:C.text,outline:"none"}}/>
                <button onClick={()=>remM(i)} style={{background:C.red,color:"#fff",border:"none",borderRadius:8,padding:"0 10px",cursor:"pointer"}}>✕</button>
              </div>
            ))}
            <Btn small variant="ghost" onClick={addM}>+ Membro</Btn>
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><Btn variant="ghost" onClick={()=>setModal(false)}>Cancelar</Btn><Btn onClick={save}>Salvar</Btn></div>
        </div>
      </Modal>}
    </div>
  );
}

function Ensaios({isAdmin,requireAdmin}) {
  const [items,loading]=useCollection("ensaios");
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({data:today(),hora:"18:00",local:"Igreja",musicas:"",obs:""});
  const save=async()=>{if(!form.data)return;await addItem("ensaios",form);setForm({data:today(),hora:"18:00",local:"Igreja",musicas:"",obs:""});setModal(false);};
  const del=id=>requireAdmin(()=>delItem("ensaios",id));
  return (
    <div>

        </div>}
        {outros.length>0&&<div>
          <div style={{fontSize:12,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Todos</div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>{outros.map(a=><BCard key={a.id} a={a}/>)}</div>

          <div style={{position:"absolute",top:58,left:0,right:0,background:C.navy,zIndex:999,padding:"8px 10px",boxShadow:"0 8px 24px rgba(0,0,0,0.3)",maxHeight:"80vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
            {NAV.map(n=>(
              <button key={n.id} onClick={()=>{setActive(n.id);setMenuOpen(false);}} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"12px 14px",borderRadius:10,border:"none",background:active===n.id?"rgba(255,255,255,0.15)":"transparent",color:active===n.id?"#fff":"rgba(255,255,255,0.6)",fontSize:14,fontWeight:active===n.id?700:400,cursor:"pointer",marginBottom:2,textAlign:"left"}}>
                <span style={{fontSize:18}}>{n.icon}</span>{n.label}
              </button>
            ))}
          </div>
        </div>
      )}
      <main style={{flex:1,overflowY:"auto",padding:"20px 16px"}}><Module {...adminProps}/></main>
    </div>
  );

  return (
    <div style={{display:"flex",height:"100vh",fontFamily:"'Segoe UI',sans-serif",background:C.offwhite,overflow:"hidden"}}>
      {LoginComp}
      <aside style={{width:220,background:C.navy,display:"flex",flexDirection:"column",flexShrink:0}}>
        <div style={{padding:"24px 20px 16px"}}>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",letterSpacing:3,textTransform:"uppercase",marginBottom:4}}>Hope Music</div>
          <div style={{fontSize:16,fontWeight:800,color:"#fff"}}>Ministério de Louvor</div>
          <button onClick={()=>isAdmin?setIsAdmin(false):setShowLogin(true)} style={{marginTop:10,background:"rgba(255,255,255,0.1)",border:"none",borderRadius:8,padding:"6px 12px",color:isAdmin?"#7effa0":"rgba(255,255,255,0.5)",fontSize:12,cursor:"pointer",fontWeight:600,width:"100%",textAlign:"left"}}>
            {isAdmin?"🔓 Líder conectado":"🔒 Entrar como líder"}
          </button>
        </div>
        <nav style={{flex:1,padding:"8px 10px",overflowY:"auto"}}>
          {NAV.map(n=>(
            <button key={n.id} onClick={()=>setActive(n.id)} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"10px 12px",borderRadius:10,border:"none",background:active===n.id?"rgba(255,255,255,0.15)":"transparent",color:active===n.id?"#fff":"rgba(255,255,255,0.6)",fontSize:13,fontWeight:active===n.id?700:400,cursor:"pointer",marginBottom:2,textAlign:"left"}}>
              <span style={{fontSize:16}}>{n.icon}</span>{n.label}
            </button>
          ))}
        </nav>
        <div style={{padding:"16px 20px",borderTop:"1px solid rgba(255,255,255,0.08)",fontSize:11,color:"rgba(255,255,255,0.3)"}}>Hope Music © 2025</div>
      </aside>
      <main style={{flex:1,overflowY:"auto",padding:"32px 36px"}}><Module {...adminProps}/></main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
